            - generic [ref=e30]:
              - paragraph [ref=e31]: My name's Arkash Jain and I'm a junior doing a BA (Math & CS)/ MS (CS) at Boston Univeristy. A software engineer by trade, I have a deep rooted interest in entrepreneurship and am exhilirated by the prospect of working for a high growth tech startup.
              - paragraph [ref=e32]: I found my calling in tech through 2 internships at Battery Ventures, a VC focussing on early stage B2B SaaS. For the first internship I focussed on sourcing startups across different verticals and for the second one, doing diligence on a specific industry.
              - paragraph [ref=e33]: Since then I have been advising startups on campus and doing outreach for the Entrepreneurs club as a VP. I have helped 2 companies design a product by doing usability testing, making personas and conducting interviews to launching a MVP.
              - paragraph [ref=e34]: Outside of school I co-host a podcast where we interview professors, athletes, artists and professionals to bring deep industry insight to students.
              - paragraph [ref=e35]: Learn more about me here!
